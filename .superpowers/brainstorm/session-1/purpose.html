<h2>どんな動画生成サイトを作りますか？</h2>
<p class="subtitle">主な用途・コア機能に近いものを選んでください</p>

<div class="options">
  <div class="option" data-choice="ai" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>AIによる動画生成</h3>
      <p>テキスト（プロンプト）や画像を入力し、生成AIを使って全く新しい動画を作り出すサイト</p>
    </div>
  </div>
  <div class="option" data-choice="editing" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>自動編集・スライドショー</h3>
      <p>ユーザーがアップロードした写真や動画素材を、自動で1つのおしゃれな動画にまとめるサイト</p>
    </div>
  </div>
  <div class="option" data-choice="avatar" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>アバター動画生成</h3>
      <p>テキストを入力すると、AIアバターが自然な音声で喋りかける動画を合成するサイト</p>
    </div>
  </div>
  <div class="option" data-choice="other" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>その他</h3>
      <p>上記以外の用途（チャット画面でテキストで教えてください）</p>
    </div>
  </div>
</div>
